# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Inject SE secrets into HTML
        run: |
          sed -i "s|__SE_JWT_TOKEN__|${{ secrets.SE_JWT_TOKEN }}|g" GoingLive.html
          sed -i "s|__SE_CHANNEL_ID__|${{ secrets.SE_CHANNEL_ID }}|g" GoingLive.html
      - name: Inject OBS websocket password into 3D HTML
        run: |
          sed -i "s|__WEB_SOCKET_P__|${{ secrets.WEB_SOCKET_P }}|g" GoingLive-3D.html
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
